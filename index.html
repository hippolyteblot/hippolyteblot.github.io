<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDO</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.0.0/crypto-js.min.js"></script>
    <style>
        #main-illustration {
            width: 50%;
            height: auto;
        }
        #main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        #conv {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 500px;
            padding: 10px;
            background-color: #fff;
            margin-top: 20px;
        }
        .chat-box {
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 10px;
        }
        .chat-content {
            background-color: #f1f1f1;
            border-radius: 10px;
            padding: 10px;
            margin: 10px;
            max-width: 80%;
        }
        .pikachu-chat .chat-content {
            align-self: flex-start;
            background-color: #e0f7fa;
        }
        .tortipouss-chat .chat-content {
            align-self: flex-end;
            background-color: #ffe0b2;
        }
        .chat-input {
            display: flex;
            width: 100%;
            margin-top: 10px;
        }
        .chat-input input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ccc;
            margin-right: 10px;
        }
        .chat-input button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background-color: #007bff;
            color: #fff;
        }
        .chat-line {
            display: flex;
            flex-wrap: nowrap;
            align-items: center;
        }
    </style>
</head>
<body class="container">
    <h1>Excuses de Pikachu pour Tortipouss</h1>

    <!-- chat bot integration -->
    <div class="container" id="main-container">
        <img src="pikatorti.jpg" alt="Pikachu et Tortipouss" id="main-illustration">
        <div id="conv">
            <div class="chat-box">
                <div class="row pikachu-chat chat-line">
                    <img src="pikachu.png" alt="Pikachu" class="img-fluid" style="width: 50px; height: 50px;">
                    <div class="chat-content">
                        <p>Salut Tortipouss, comment je peux me faire pardonner ?</p>
                    </div>
                </div>
                <!-- Messages will be appended here -->
            </div>
            <div class="chat-input">
                <input type="text" id="message-input" placeholder="Écris un message...">
                <button onclick="sendMessage()">Envoyer</button>
            </div>
        </div>
    </div>
    
    <script>
        let messages = [
            {
                role: "system",
                content: "Tu es Pikachu. Tu as fait une bêtise en mentant à Tortipouss. Tu veux te faire pardonner à 100%. Fais de ton mieux. Tu peux lui parler du fait qu'elle aimerait bien faire un orga dans l'assocaition des 24H de l'INSA (il s'agit d'un rôle important au sein de l'association), qu'elle aime bien les chats et que tu y ressembles un peu, que ce que tu viens de coder mérite d'être pardonné à 100%, que tu lui feras un câlin. FAIS DES MESSAGES BREF (quelques mots) et ne dis pas tout ça à chaque fois, garde des arguments pour plus tard."
            },
            {
                role: "assistant",
                content: "Salut Tortipouss, comment je peux me faire pardonner ?"
            }
        ];

        async function sendMessage() {
            const messageInput = document.getElementById('message-input');
            const message = messageInput.value.trim();
            
            if (message !== "") {
                const chatBox = document.querySelector('.chat-box');

                const messageElement = document.createElement('div');
                messageElement.classList.add('row', 'tortipouss-chat');
                messageElement.innerHTML = `
                    <img src="tortipouss.png" alt="Tortipouss" class="img-fluid" style="width: 50px; height: 50px;">
                    <div class="chat-content">
                        <p>${message}</p>
                    </div>
                `;
                chatBox.appendChild(messageElement);
                
                chatBox.scrollTop = chatBox.scrollHeight;
                    
                messageInput.value = "";
                
                messages.push({
                    role: "user",
                    content: message
                });

                const response = await getResponseFromAPI();
                
                const pikachuMessageElement = document.createElement('div');
                pikachuMessageElement.classList.add('row', 'pikachu-chat', 'chat-line');
                pikachuMessageElement.innerHTML = `
                    <img src="pikachu.png" alt="Pikachu" class="img-fluid" style="width: 50px; height: 50px;">
                    <div class="chat-content">
                        <p>${response}</p>
                    </div>
                `;
                chatBox.appendChild(pikachuMessageElement);
                
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
        
        async function getResponseFromAPI() {
            const msg = "U2FsdGVkX1/EWdL+EzrFHxxp1rXWv5i4xHFHGNiTF9QFe+AOj2fXYTH3XZgrg4Wnf84dt6IN/M7sxaYXwAzRh0Hw2Mq41aR45a/SL2arcTU=";
            let value = CryptoJS.AES.decrypt(msg, "pikachu").toString(CryptoJS.enc.Utf8);
            value = value.replace(/"/g, "");
            const apiUrl = "https://api.openai.com/v1/chat/completions";
            
            const response = await fetch(apiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${value}`
                },
                body: JSON.stringify({
                    model: "gpt-3.5-turbo",
                    messages: messages
                })
            });
            
            const data = await response.json();
            const pikachuResponse = data.choices[0].message.content;

            messages.push({
                role: "assistant",
                content: pikachuResponse
            });

            return pikachuResponse;
        }
    </script>
</body>
</html>
